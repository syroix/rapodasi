<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Rap Odası | Admin Panelli</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .mesaj { background: #222; padding: 10px; margin: 5px 0; border-radius: 5px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rap Odası</h1>
    <input type="text" id="isim" placeholder="Adını gir...">
    <input type="text" id="mesajGirdi" placeholder="Mesajını yaz...">
    <button onclick="gonder()">Gönder</button>
    <div id="mesajListesi"></div>
</div>

<script>
    // 1. AYARLAR
    const adminler = ["Syroix", "Admin"]; // Admin isimlerini buraya yaz
    let banliKullanicilar = JSON.parse(localStorage.getItem("banlilar") || "{}");

    function gonder() {
        let isim = document.getElementById("isim").value;
        let mesaj = document.getElementById("mesajGirdi").value;

        // 2. BAN KONTROLÜ
        if (banliKullanicilar[isim]) {
            alert("Banlısın, yazamazsın!");
            return;
        }

        // 3. ADMIN KOMUTLARI
        if (adminler.includes(isim) && mesaj.startsWith("/")) {
            let komut = mesaj.split(" ");
            if (komut[0] === "/ban") {
                let hedef = komut[1];
                banliKullanicilar[hedef] = true;
                localStorage.setItem("banlilar", JSON.stringify(banliKullanicilar));
                alert(hedef + " banlandı!");
            }
            return;
        }

        // Mesajı ekrana bas (Admin değilse mesajı göster)
        let div = document.createElement("div");
        div.className = "mesaj";
        div.innerHTML = `<b>${isim}:</b> ${mesaj}`;
        document.getElementById("mesajListesi").appendChild(div);
        document.getElementById("mesajGirdi").value = "";
    }
</script>

</body>
</html>
