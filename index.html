<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Rap Odası | Google Giriş</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // BURAYA KENDİ FIREBASE PROJE BİLGİLERİNİ YAPIŞTIR
        const firebaseConfig = {
            apiKey: "SENIN_API_KEYIN",
            authDomain: "senin-projen.firebaseapp.com",
            projectId: "senin-projen",
            storageBucket: "senin-projen.appspot.com",
            messagingSenderId: "ID_NUMARAN",
            appId: "APP_ID_NUMARAN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();

        // Giriş Yapma
        window.girisYap = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).then(() => alert("Giriş Başarılı!"));
        };

        // Şarkı Ekleme
        window.sarkiPaylas = () => {
            const soz = document.getElementById("sarkiMetni").value;
            const user = auth.currentUser;
            if (user) {
                addDoc(collection(db, "sarkilar"), {
                    yazar: user.displayName,
                    uid: user.uid,
                    metin: soz
                });
            } else {
                alert("Önce Giriş Yap!");
            }
        };

        // Şarkıları Listeleme (Sadece silme butonunu eklemek için)
        onSnapshot(collection(db, "sarkilar"), (snapshot) => {
            let html = "";
            snapshot.forEach((doc) => {
                const sarki = doc.data();
                html += `<div><p>${sarki.metin} - <b>${sarki.yazar}</b></p></div>`;
            });
            document.getElementById("liste").innerHTML = html;
        });
    </script>
</head>
<body>

    <h1>Rap Odası</h1>
    <button onclick="girisYap()">Google ile Giriş Yap</button>

    <div style="margin-top:20px;">
        <textarea id="sarkiMetni" placeholder="Şarkı sözlerini yaz..."></textarea>
        <button onclick="sarkiPaylas()">Paylaş</button>
    </div>

    <div id="liste"></div>

</body>
</html>
