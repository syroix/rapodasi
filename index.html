<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Flow Arena | Admin Destekli</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // BURAYA FIREBASE BİLGİLERİNİ YAZ
        const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        window.googleGiris = () => signInWithPopup(auth, provider);

        // Şifreli Admin Girişi
        window.adminGiris = () => {
            const sifre = prompt("Admin Şifresini Gir:");
            if (sifre === "2013burak2013") {
                document.getElementById("adminPaneli").style.display = "block";
                alert("Admin Paneline Hoşgeldin!");
            } else {
                alert("Hatalı Şifre!");
            }
        };

        window.mesajGonder = () => {
            const input = document.getElementById("mesajInput");
            if (input.value.trim() !== "") {
                addDoc(collection(db, "mesajlar"), {
                    yazan: auth.currentUser.displayName,
                    foto: auth.currentUser.photoURL,
                    metin: input.value,
                    tarih: serverTimestamp()
                });
                input.value = "";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("girisEkrani").style.display = "none";
                document.getElementById("sohbetEkrani").style.display = "flex";
            }
        });

        onSnapshot(query(collection(db, "mesajlar"), orderBy("tarih")), (snapshot) => {
            const liste = document.getElementById("mesajListesi");
            liste.innerHTML = "";
            snapshot.forEach(doc => {
                const m = doc.data();
                liste.innerHTML += `<div class="msg"><img src="${m.foto}"><b>${m.yazan}:</b> ${m.metin}</div>`;
            });
            liste.scrollTop = liste.scrollHeight;
        });
    </script>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; }
        #sohbetEkrani { display: none; height: 100vh; flex-direction: column; padding: 20px; }
        #adminPaneli { display: none; background: #333; padding: 20px; margin-top: 10px; border: 2px solid #1db954; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        #mesajListesi { flex-grow: 1; overflow-y: auto; background: #181818; padding: 15px; border-radius: 8px; }
        .msg { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .msg img { width: 30px; border-radius: 50%; }
        button { background: #1db954; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div id="girisEkrani" style="text-align:center; padding-top:200px;">
        <h1>Flow Arena</h1>
        <button onclick="googleGiris()">Google ile Giriş Yap</button>
    </div>

    <div id="sohbetEkrani">
        <div class="top-bar">
            <h2>Rap Odası</h2>
            <button onclick="adminGiris()">RapOdasıAdmin</button>
        </div>
        
        <div id="adminPaneli">
            <h3>Admin Paneli (Şifre Onaylandı)</h3>
            <p>Buraya ban listesi veya ayarları ekleyebilirsin.</p>
        </div>

        <div id="mesajListesi"></div>
        <div style="margin-top:10px;">
            <input type="text" id="mesajInput" placeholder="Rapini yaz...">
            <button onclick="mesajGonder()">Gönder</button>
        </div>
    </div>

</body>
</html>
