<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Rap Odası</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: #1e1e1e; padding: 20px; border-radius: 10px; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; background: #1db954; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #mesajListesi { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        .mesaj { background: #2a2a2a; padding: 8px; margin: 5px 0; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rap Odası</h1>
    <input type="text" id="mesajGirdi" placeholder="Rap'ini veya mesajını yaz...">
    <button onclick="mesajEkle()">Gönder</button>
    <div id="mesajListesi"></div>
</div>

<script>
    // Sayfa açıldığında eski mesajları yükle
    window.onload = mesajlariYukle;

    function mesajEkle() {
        let girdi = document.getElementById("mesajGirdi");
        let mesajlar = JSON.parse(localStorage.getItem("rapMesajlari") || "[]");
        
        if (girdi.value.trim() !== "") {
            mesajlar.push(girdi.value);
            localStorage.setItem("rapMesajlari", JSON.stringify(mesajlar));
            girdi.value = "";
            mesajlariYukle();
        }
    }

    function mesajlariYukle() {
        let mesajlar = JSON.parse(localStorage.getItem("rapMesajlari") || "[]");
        let liste = document.getElementById("mesajListesi");
        liste.innerHTML = "";
        mesajlar.forEach(mesaj => {
            let div = document.createElement("div");
            div.className = "mesaj";
            div.innerText = mesaj;
            liste.appendChild(div);
        });
    }
</script>

</body>
</html>
